version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: pitchperfect_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pitchperfect_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:6-jammy
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: examplepassword
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '5000:5000'
    environment:
      - DATABASE_URL=postgresql://pitchperfect_user:password@postgres:5432/pitchperfect_db?schema=public
      - MONGODB_URI=mongodb://root:examplepassword@mongodb:27017/pitchperfect_mongo?authSource=admin
      - JWT_SECRET=local_dev_secret
      - STRIPE_SECRET_KEY=sk_test_mock
      - STRIPE_WEBHOOK_SECRET=whsec_mock
      - PORT=5000
    depends_on:
      - postgres
      - mongodb

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:5000
      - NEXT_PUBLIC_SOCKET_URL=http://backend:5000
    depends_on:
      - backend

volumes:
  postgres_data:
  mongodb_data:
